name: Release Obsidian plugin (GitHub)

on:
    push:
        tags:
            - '*'

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: "20.x"
                    cache: 'npm'

            -   name: Build
                run: |
                    npm install
                    npm run build

            -   name: Release
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                run: |
                    tag="${GITHUB_REF#refs/tags/}"
                    
                    gh release create "$tag" \
                      --title="$tag" \
                      dist/main.js dist/manifest.json dist/styles.css